<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wyltek Industries</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">

    <header id="app-header">
      <div class="header-inner">
        <img src="/wyltek-mark.png" alt="" class="logo-mark">
        <span class="logo-text">Wyltek</span>
        <div id="auth-badge" class="auth-badge">
          <span id="auth-label">Connect</span>
        </div>
      </div>
    </header>

    <main id="tab-content"></main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" data-tab="chain">
        <span class="nav-icon">⛓️</span>
        <span class="nav-label">Chain</span>
      </button>
      <button class="nav-btn" data-tab="research">
        <span class="nav-icon">🔬</span>
        <span class="nav-label">Research</span>
      </button>
      <button class="nav-btn" data-tab="lounge">
        <span class="nav-icon">💬</span>
        <span class="nav-label">Lounge</span>
      </button>
      <button class="nav-btn" data-tab="more">
        <span class="nav-icon">⋯</span>
        <span class="nav-label">More</span>
      </button>
    </nav>

  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
