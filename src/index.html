<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Wyltek Industries</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">

    <header id="app-header">
      <div class="header-inner">
        <!-- Home button (acts as both logo and nav) -->
        <button id="home-btn" class="home-btn" aria-label="Home">
          <img src="/wyltek-mark.png" alt="Wyltek" class="logo-mark">
        </button>
        <span class="logo-text">Wyltek</span>
        <div id="auth-badge" class="auth-badge">
          <span id="auth-label">Connect</span>
        </div>
      </div>
      <div id="sub-nav" class="sub-nav"></div>
    </header>

    <main id="tab-content"></main>

    <nav id="bottom-nav">
      <button class="nav-btn" data-tab="home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn active" data-tab="chain">
        <span class="nav-icon">⛓️</span>
        <span class="nav-label">Chain</span>
      </button>
      <button class="nav-btn" data-tab="tools">
        <span class="nav-icon">🔧</span>
        <span class="nav-label">Tools</span>
      </button>
      <button class="nav-btn" data-tab="social">
        <span class="nav-icon">💬</span>
        <span class="nav-label">Social</span>
      </button>
      <button class="nav-btn" data-tab="research">
        <span class="nav-icon">🔬</span>
        <span class="nav-label">Research</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>

  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
